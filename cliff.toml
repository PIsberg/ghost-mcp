# cliff.toml — git-cliff configuration for ghost-mcp
# Docs: https://git-cliff.org/docs/configuration
#
# git-cliff reads conventional commits and produces grouped changelogs.
# GoReleaser uses this file when `changelog.use = "git-cliff"` is set.
# Run locally: git-cliff --tag v1.2.3 -o CHANGELOG.md

[changelog]
header = """
# Changelog

All notable changes to ghost-mcp are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/);
versions follow [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{% if commit.links %} ([#{{ commit.links | map(attribute="text") | join(sep=", #") }}]({{ commit.links | map(attribute="href") | first }}))\
{% endif %}
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs",     group = "Documentation" },
  { message = "^test",     skip = true },
  { message = "^chore",    skip = true },
  { message = "^ci",       skip = true },
  { message = "^build\\(deps\\)", group = "Dependency Updates" },
  { message = "^build",    skip = true },
  { body = ".*security",   group = "Security" },
]

protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
