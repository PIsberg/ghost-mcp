name: Build Windows Dependencies

# Run this workflow manually to rebuild the pre-compiled Windows dependency
# bundle (Tesseract + Leptonica via vcpkg / MinGW). The resulting zip is
# uploaded as a GitHub Release asset and downloaded by the main test workflow,
# eliminating the ~20-minute vcpkg compile on every CI run.
#
# Re-run only when you need a new Tesseract/Leptonica version or when the
# x64-mingw-dynamic triplet changes.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag for the deps bundle (e.g. deps-windows-v1)'
        required: true
        default: 'deps-windows-v1'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-deps:
    runs-on: windows-latest

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit

    - name: Install MinGW via Chocolatey
      run: |
        $mingwBin = "C:\ProgramData\mingw64\mingw64\bin"
        if (Test-Path "$mingwBin\gcc.exe") {
          Write-Host "MinGW already present at $mingwBin, skipping install"
        } else {
          choco install mingw -y --no-progress
        }
        $mingwBin = "C:\ProgramData\mingw64\mingw64\bin"
        echo "$mingwBin" >> $env:GITHUB_PATH
        $env:PATH = "$mingwBin;$env:PATH"
        gcc --version

    - name: Clone and bootstrap vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git $env:USERPROFILE\vcpkg
        Set-Location $env:USERPROFILE\vcpkg
        .\bootstrap-vcpkg.bat -disableMetrics

    - name: Build Tesseract and Leptonica via vcpkg
      run: |
        $mingwBin = "C:\ProgramData\mingw64\mingw64\bin"
        $env:CC  = "$mingwBin\gcc.exe"
        $env:CXX = "$mingwBin\g++.exe"
        Set-Location $env:USERPROFILE\vcpkg
        .\vcpkg install tesseract:x64-mingw-dynamic leptonica:x64-mingw-dynamic --disable-metrics

    - name: Create libtesseract.dll.a symlink for gosseract
      run: |
        $libDir = "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic\lib"
        $tessLib = Get-Item "$libDir\libtesseract*.dll.a" | Select-Object -First 1
        if ($tessLib -and -not (Test-Path "$libDir\libtesseract.dll.a")) {
          Copy-Item $tessLib.FullName "$libDir\libtesseract.dll.a"
          Write-Host "Copied $($tessLib.Name) -> libtesseract.dll.a"
        }

    - name: Download Tesseract English language data
      run: |
        $tessdataDir = "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic\share\tessdata"
        New-Item -ItemType Directory -Force -Path $tessdataDir | Out-Null
        Invoke-WebRequest "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata" `
          -OutFile "$tessdataDir\eng.traineddata"

    - name: Package the installed tree into a zip
      run: |
        $src = "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic"
        $dst = "$env:RUNNER_TEMP\deps-windows-x64-mingw-dynamic.zip"
        Compress-Archive -Path "$src\*" -DestinationPath $dst
        Write-Host "Bundle size: $([math]::Round((Get-Item $dst).Length / 1MB, 1)) MB"
        echo "BUNDLE_PATH=$dst" >> $env:GITHUB_ENV

    - name: Create GitHub Release and upload bundle
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $tag = "${{ github.event.inputs.tag }}"
        $asset = $env:BUNDLE_PATH

        # Delete existing release/tag with the same name so re-running is safe
        gh release delete $tag --yes --repo $env:GITHUB_REPOSITORY 2>$null || true
        git -C $env:USERPROFILE\vcpkg tag -d $tag 2>$null || true

        gh release create $tag $asset `
          --repo $env:GITHUB_REPOSITORY `
          --title "Windows pre-built deps ($tag)" `
          --notes "Pre-compiled Tesseract + Leptonica for x64-mingw-dynamic. Generated by the build-deps-windows workflow. Re-run the workflow to update." `
          --prerelease
