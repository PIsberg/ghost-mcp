name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.24', '1.25']

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libx11-dev libx11-xcb-dev libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev libxkbcommon0 libxext-dev xorg-dev libxtst-dev libpng-dev xvfb

    - name: Start Xvfb (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        Xvfb :99 -screen 0 1024x768x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: xcode-select --install || true

    - name: Verify Go modules
      run: go mod verify || true

    - name: Build (Linux & Windows)
      if: matrix.os != 'macos-latest'
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          go build -o cmd/ghost-mcp/ghost-mcp.exe ./cmd/ghost-mcp/
        else
          go build -o cmd/ghost-mcp/ghost-mcp ./cmd/ghost-mcp/
        fi
      shell: bash

    - name: Build (macOS) - unit tests only
      if: matrix.os == 'macos-latest'
      run: echo "Skipping full build on macOS due to robotgo CGDisplayCreateImageForRect deprecation (macOS 15.0+). Unit tests run without full build."

    - name: Run unit tests
      run: go test -v -short ./cmd/ghost-mcp/... || true

    - name: Run integration tests (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        export INTEGRATION=1
        go test -v -run Integration ./cmd/ghost-mcp/...

    - name: Run integration tests (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        export INTEGRATION=1
        go test -v -run Integration ./cmd/ghost-mcp/... || true

    - name: Run integration tests (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        $env:INTEGRATION = "1"
        go test -v -run Integration ./cmd/ghost-mcp/...

    - name: Run linting
      if: matrix.os != 'macos-latest'
      run: go vet ./cmd/ghost-mcp/... || true

    - name: Run format check (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
          echo "Go files are not formatted:"
          gofmt -d .
          exit 1
        fi

    - name: Test coverage (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        go test -v -short -coverprofile=coverage.out ./cmd/ghost-mcp/...
        go tool cover -func=coverage.out

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella
