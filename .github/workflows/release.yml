name: Release

# Triggered on version tags: v1.2.3, v1.2.3-beta.1, etc.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub releases and upload assets

# ── Native build strategy ─────────────────────────────────────────────────────
#
# CGo requires a native toolchain — cross-compilation is not possible.
# --split is a GoReleaser Pro feature, so we use the free `prebuilt` builder:
#
#   1. Each OS runner compiles with `go build` and stages the binary under
#      dist/prebuilt/{os}_{arch}/.
#   2. The release job downloads all staged binaries and runs `goreleaser
#      release`, which packages, generates changelogs, and publishes.

jobs:

  # ── Linux: compile binary ────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: >-
            gcc libx11-dev libx11-xcb-dev libxcb1-dev libxkbcommon-dev
            libxkbcommon-x11-dev libxext-dev xorg-dev libxtst-dev libpng-dev
            tesseract-ocr libleptonica-dev libtesseract-dev
          version: 1

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            gcc libx11-dev libx11-xcb-dev libxcb1-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libxext-dev xorg-dev libxtst-dev libpng-dev \
            tesseract-ocr libleptonica-dev libtesseract-dev

      - name: Build Linux binary
        run: |
          mkdir -p prebuilt/linux_amd64
          CGO_ENABLED=1 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o prebuilt/linux_amd64/ghost-mcp \
            ./cmd/ghost-mcp/

      - name: Upload Linux prebuilt
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: prebuilt-linux
          path: prebuilt/
          retention-days: 1

  # ── Windows: compile binary + stage DLLs ─────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MinGW (GCC for CGo)
        run: |
          $mingwBin = "C:\ProgramData\mingw64\mingw64\bin"
          if (Test-Path "$mingwBin\gcc.exe") {
            Write-Host "MinGW already present, skipping choco install"
          } else {
            choco install mingw -y --no-progress
          }
          echo "$mingwBin" >> $env:GITHUB_PATH

      - name: Download pre-built Windows deps bundle
        id: download-deps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download deps-windows-v2 `
            --repo $env:GITHUB_REPOSITORY `
            --pattern "deps-windows-x64-mingw-dynamic.zip" `
            --dir "$env:RUNNER_TEMP" `
            --clobber 2>$null
          if ($LASTEXITCODE -eq 0) {
            $installDir = "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic"
            New-Item -ItemType Directory -Force -Path $installDir | Out-Null
            Expand-Archive "$env:RUNNER_TEMP\deps-windows-x64-mingw-dynamic.zip" `
              -DestinationPath $installDir -Force
            Write-Host "Pre-built bundle restored successfully"
            echo "DEPS_FROM_RELEASE=true" >> $env:GITHUB_ENV
          } else {
            Write-Host "Pre-built bundle not found — will build via vcpkg"
            echo "DEPS_FROM_RELEASE=false" >> $env:GITHUB_ENV
          }
          exit 0

      - name: Cache vcpkg binary archives (fallback)
        if: env.DEPS_FROM_RELEASE != 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: vcpkg-x64-mingw-tesseract-leptonica-v2
          restore-keys: vcpkg-x64-mingw-tesseract-leptonica-

      - name: Build Windows deps via vcpkg (fallback)
        if: env.DEPS_FROM_RELEASE != 'true'
        run: |
          $mingwBin = "C:\ProgramData\mingw64\mingw64\bin"
          $env:CC  = "$mingwBin\gcc.exe"
          $env:CXX = "$mingwBin\g++.exe"
          $archivesDir = "$env:USERPROFILE\AppData\Local\vcpkg\archives"
          New-Item -ItemType Directory -Force -Path $archivesDir | Out-Null
          $env:VCPKG_BINARY_SOURCES = "clear;files,$archivesDir,readwrite"

          git clone https://github.com/Microsoft/vcpkg.git $env:USERPROFILE\vcpkg
          Set-Location $env:USERPROFILE\vcpkg
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg install tesseract:x64-mingw-dynamic leptonica:x64-mingw-dynamic --disable-metrics

          $libDir = "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic\lib"
          $tessLib = Get-Item "$libDir\libtesseract*.dll.a" | Select-Object -First 1
          if ($tessLib -and -not (Test-Path "$libDir\libtesseract.dll.a")) {
            Copy-Item $tessLib.FullName "$libDir\libtesseract.dll.a"
          }

          $tessdataDir = "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic\share\tessdata"
          New-Item -ItemType Directory -Force -Path $tessdataDir | Out-Null
          Invoke-WebRequest "https://github.com/tesseract-ocr/tessdata_fast/raw/main/eng.traineddata" `
            -OutFile "$tessdataDir\eng.traineddata"

      - name: Configure CGO environment
        run: |
          $vcpkgInstall = ($env:USERPROFILE + "/vcpkg/installed/x64-mingw-dynamic").Replace('\', '/')
          echo "CGO_CPPFLAGS=-I$vcpkgInstall/include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L$vcpkgInstall/lib"      >> $env:GITHUB_ENV
          echo "CGO_ENABLED=1"                         >> $env:GITHUB_ENV
          echo "TESSDATA_PREFIX=$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic\share\tessdata" >> $env:GITHUB_ENV
          echo "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic\bin" >> $env:GITHUB_PATH

      - name: Build Windows binary
        run: |
          New-Item -ItemType Directory -Force -Path prebuilt\windows_amd64 | Out-Null
          go build -trimpath -ldflags="-s -w" `
            -o prebuilt\windows_amd64\ghost-mcp.exe `
            .\cmd\ghost-mcp\

      - name: Stage Windows DLLs for archive bundling
        run: |
          $dllSrc = "$env:USERPROFILE\vcpkg\installed\x64-mingw-dynamic\bin"
          New-Item -ItemType Directory -Force -Path windows-dlls | Out-Null
          Copy-Item "$dllSrc\*.dll" windows-dlls\ -Force
          Write-Host "Staged $((Get-ChildItem windows-dlls\).Count) DLLs"

      - name: Upload Windows prebuilt
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: prebuilt-windows
          path: prebuilt/
          retention-days: 1

      - name: Upload Windows DLLs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-dlls
          path: windows-dlls/
          retention-days: 1

  # ── Package and publish GitHub release ───────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Linux prebuilt
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: prebuilt-linux
          path: prebuilt/

      - name: Download Windows prebuilt
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: prebuilt-windows
          path: prebuilt/

      - name: Download Windows DLLs
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: windows-dlls
          path: windows-dlls/

      - name: Verify prebuilt binaries
        run: |
          echo "=== Prebuilt binaries ==="
          find prebuilt/ windows-dlls/ -type f | head -50
          echo "========================="
          test -f prebuilt/linux_amd64/ghost-mcp || { echo "ERROR: Linux binary not found"; exit 1; }
          test -f prebuilt/windows_amd64/ghost-mcp.exe || { echo "ERROR: Windows binary not found"; exit 1; }
          echo "All required binaries found"

      - name: Install git-cliff
        uses: taiki-e/install-action@ab3728c7ba6948b9b429627f4d55a68842b27f18 # v2.50.3
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md and move tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          git-cliff --tag "$TAG" -o CHANGELOG.md
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "docs: update CHANGELOG.md for $TAG [skip ci]"
            # Delete old tag locally and create new one on this commit
            git tag -d "$TAG"
            git tag "$TAG" HEAD
            # Force push HEAD to update main branch on remote (we own this commit)
            git push --force-with-lease origin HEAD:refs/heads/main
            git push origin "$TAG" --force
          fi

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          install-only: true

      - name: Package and publish
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOOP_TAP_GITHUB_TOKEN: ${{ secrets.SCOOP_TAP_GITHUB_TOKEN }}
