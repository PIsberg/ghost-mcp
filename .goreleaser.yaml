# .goreleaser.yaml — GoReleaser v2 configuration for ghost-mcp
# Docs: https://goreleaser.com
#
# CGo notes:
#   This project uses CGo (robotgo, gosseract). Cross-compilation is not
#   possible, so the release workflow builds natively on each OS runner and
#   stages the binary under dist/prebuilt/{os}_{arch}/.
#   GoReleaser's `prebuilt` builder picks them up — no Pro plan required.
#
# Windows DLL bundling:
#   Before running goreleaser, CI copies vcpkg runtime DLLs into
#   dist/windows-dlls/. The windows-archive config picks them up so the
#   released .zip is fully self-contained.
#
# Workflow (see .github/workflows/release.yml):
#   1. build-linux:   go build → dist/prebuilt/linux_amd64/ghost-mcp
#   2. build-windows: go build → dist/prebuilt/windows_amd64/ghost-mcp.exe
#                     + DLLs  → dist/windows-dlls/*.dll
#   3. release:       download both dist/ dirs, goreleaser release

version: 2

project_name: ghost-mcp

# ── builds (prebuilt — binaries are compiled by CI before goreleaser runs) ───
# macOS is skipped: robotgo CGDisplayCreateImageForRect is deprecated on
# macOS 15+ and the build fails. Re-enable once upstream is fixed.

builds:
  - id: ghost-mcp-linux
    builder: prebuilt
    binary: ghost-mcp
    goos:
      - linux
    goarch:
      - amd64
    prebuilt:
      path: "dist/prebuilt/{{ .Os }}_{{ .Arch }}/{{ .Binary }}"

  - id: ghost-mcp-windows
    builder: prebuilt
    binary: ghost-mcp
    goos:
      - windows
    goarch:
      - amd64
    prebuilt:
      path: "dist/prebuilt/{{ .Os }}_{{ .Arch }}/{{ .Binary }}{{ .Ext }}"

# ── archives ─────────────────────────────────────────────────────────────────

archives:
  - id: linux-archive
    ids:
      - ghost-mcp-linux
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - src: README.md
        dst: .
      - src: LICENSE
        dst: .
      - src: installers/install.sh
        dst: installers/

  - id: windows-archive
    ids:
      - ghost-mcp-windows
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - zip
    # DLLs staged into dist/windows-dlls/ by the Windows CI runner.
    files:
      - src: dist/windows-dlls/*.dll
        dst: .
        strip_parent: true
        info:
          mode: 0644
      - src: README.md
        dst: .
      - src: LICENSE
        dst: .
      - src: installers/install.ps1
        dst: installers/

# ── Linux packages (NFPM) ────────────────────────────────────────────────────

nfpms:
  - id: linux-packages
    ids:
      - ghost-mcp-linux
    package_name: ghost-mcp
    vendor: Peter Isberg
    homepage: https://github.com/PIsberg/ghost-mcp
    maintainer: Peter Isberg
    description: >-
      OS-level UI automation MCP server. Exposes mouse, keyboard, screenshot,
      and OCR tools to AI clients such as Claude via the Model Context Protocol.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    dependencies:
      - tesseract-ocr
    recommends:
      - tesseract-ocr-eng
    contents:
      - src: README.md
        dst: /usr/share/doc/ghost-mcp/README.md
      - src: LICENSE
        dst: /usr/share/doc/ghost-mcp/LICENSE
      - src: installers/install.sh
        dst: /usr/share/doc/ghost-mcp/install.sh

# ── Scoop (Windows package manager) ──────────────────────────────────────────
# Requires a "scoop-ghost-mcp" repo at github.com/PIsberg/scoop-ghost-mcp and
# a SCOOP_TAP_GITHUB_TOKEN repository secret (PAT with repo scope on that repo).
# Remove this section if you do not maintain a Scoop bucket.

scoops:
  - name: ghost-mcp
    ids:
      - windows-archive
    repository:
      owner: PIsberg
      name: scoop-ghost-mcp
      token: "{{ .Env.SCOOP_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/PIsberg/ghost-mcp
    description: >-
      OS-level UI automation MCP server for AI agents (Claude, etc.)
    license: MIT
    url_template: "https://github.com/PIsberg/ghost-mcp/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

# ── checksums ────────────────────────────────────────────────────────────────

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ── changelog ────────────────────────────────────────────────────────────────

changelog:
  use: git-cliff
  abbrev: 7

# ── release ──────────────────────────────────────────────────────────────────

release:
  github:
    owner: PIsberg
    name: ghost-mcp
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  header: |
    ## Installation

    **Windows** — download the `.zip`, extract, run `installers\install.ps1`.

    **Linux (Debian/Ubuntu)** — download and install the `.deb`:
    ```sh
    sudo dpkg -i ghost-mcp_{{ .Version }}_linux_amd64.deb
    ```

    **Linux (other)** — download the `_linux_amd64.tar.gz` and run `installers/install.sh`.

    See [README](https://github.com/PIsberg/ghost-mcp#readme) for full setup instructions.
