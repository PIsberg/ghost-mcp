# .goreleaser.yaml — GoReleaser v2 configuration for ghost-mcp
# Docs: https://goreleaser.com
#
# CGo strategy:
#   "builder: prebuilt" does not exist in goreleaser free — the only valid
#   builders are go, rust, zig, bun, deno, uv, poetry, etc.  Using it silently
#   fell back to the go builder, which ran `go build` → `go vet` → CGo failure.
#
#   Fix: set `tool: "true"` (Linux's no-op binary) so goreleaser runs
#   `true build … -o <path>` which exits 0 immediately without invoking the
#   Go toolchain at all.  A pre-build hook places the correct native binary at
#   <path> before the no-op command runs.  Goreleaser then archives it as usual.
#
# Workflow (see .github/workflows/release.yml):
#   1. build-linux   — native `go build` → dist/prebuilt/linux_amd64/ghost-mcp
#   2. build-windows — native `go build` → dist/prebuilt/windows_amd64/ghost-mcp.exe
#                    + vcpkg DLLs        → dist/windows-dlls/*.dll
#   3. release       — download both dist/ dirs, run `goreleaser release --clean`

version: 2

project_name: ghost-mcp

# ctx.Env is passed to every go invocation (go list -m in gomod pipe, etc.).
# CGO_ENABLED=0 prevents any incidental go command from needing CGo headers.
env:
  - CGO_ENABLED=0

# ── builds ───────────────────────────────────────────────────────────────────
# macOS is skipped: robotgo CGDisplayCreateImageForRect deprecated on macOS 15+.

builds:
  - id: ghost-mcp-linux
    binary: ghost-mcp
    goos:
      - linux
    goarch:
      - amd64
    # no-op build: `true build … -o <path> …` exits 0 without compiling.
    # The pre-hook copies the native binary to <path> first.
    tool: "true"
    no_main_check: true
    hooks:
      pre:
        - cmd: cp dist/prebuilt/linux_amd64/ghost-mcp {{ .Path }}

  - id: ghost-mcp-windows
    binary: ghost-mcp
    goos:
      - windows
    goarch:
      - amd64
    tool: "true"
    no_main_check: true
    hooks:
      pre:
        - cmd: cp dist/prebuilt/windows_amd64/ghost-mcp.exe {{ .Path }}

# ── archives ─────────────────────────────────────────────────────────────────

archives:
  - id: linux-archive
    ids:
      - ghost-mcp-linux
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - src: README.md
        dst: .
      - src: LICENSE
        dst: .
      - src: installers/install.sh
        dst: installers/

  - id: windows-archive
    ids:
      - ghost-mcp-windows
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - zip
    # DLLs staged into dist/windows-dlls/ by the Windows CI runner.
    files:
      - src: dist/windows-dlls/*.dll
        dst: .
        strip_parent: true
        info:
          mode: 0644
      - src: README.md
        dst: .
      - src: LICENSE
        dst: .
      - src: installers/install.ps1
        dst: installers/

# ── Linux packages (NFPM) ────────────────────────────────────────────────────

nfpms:
  - id: linux-packages
    ids:
      - ghost-mcp-linux
    package_name: ghost-mcp
    vendor: Peter Isberg
    homepage: https://github.com/PIsberg/ghost-mcp
    maintainer: Peter Isberg
    description: >-
      OS-level UI automation MCP server. Exposes mouse, keyboard, screenshot,
      and OCR tools to AI clients such as Claude via the Model Context Protocol.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    dependencies:
      - tesseract-ocr
    recommends:
      - tesseract-ocr-eng
    contents:
      - src: README.md
        dst: /usr/share/doc/ghost-mcp/README.md
      - src: LICENSE
        dst: /usr/share/doc/ghost-mcp/LICENSE
      - src: installers/install.sh
        dst: /usr/share/doc/ghost-mcp/install.sh

# ── Scoop (Windows package manager) ──────────────────────────────────────────

scoops:
  - name: ghost-mcp
    ids:
      - windows-archive
    repository:
      owner: PIsberg
      name: scoop-ghost-mcp
      token: "{{ .Env.SCOOP_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/PIsberg/ghost-mcp
    description: >-
      OS-level UI automation MCP server for AI agents (Claude, etc.)
    license: MIT
    url_template: "https://github.com/PIsberg/ghost-mcp/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

# ── checksums ────────────────────────────────────────────────────────────────

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ── changelog ────────────────────────────────────────────────────────────────

changelog:
  use: git-cliff
  abbrev: 7

# ── release ──────────────────────────────────────────────────────────────────

release:
  github:
    owner: PIsberg
    name: ghost-mcp
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  header: |
    ## Installation

    **Windows** — download the `.zip`, extract, run `installers\install.ps1`.

    **Linux (Debian/Ubuntu)** — download and install the `.deb`:
    ```sh
    sudo dpkg -i ghost-mcp_{{ .Version }}_linux_amd64.deb
    ```

    **Linux (other)** — download the `_linux_amd64.tar.gz` and run `installers/install.sh`.

    See [README](https://github.com/PIsberg/ghost-mcp#readme) for full setup instructions.
